<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan Your Date 💐</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffe6f2, #fff6dc, #e7f8ef);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 90%;
      max-width: 430px;
      padding: 35px 25px;
      border-radius: 35px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 20px 60px rgba(255, 120, 170, 0.35);
      text-align: center;
      position: relative;
      z-index: 5;
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      color: #ff5fa8;
      font-size: 34px;
      margin: 0 0 12px;
    }

    p {
      color: #8b5e6b;
      font-size: 19px;
      margin-bottom: 28px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      min-height: 75px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.25s ease;
      white-space: nowrap;
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff77b7, #ff4f9a);
      color: white;
      box-shadow: 0 10px 25px rgba(255, 79, 154, 0.45);
      z-index: 10;
    }

    #yesBtn:hover {
      transform: scale(1.08);
    }

    #noBtn {
      background: white;
      color: #ff5fa8;
      border: 2px solid #ffc1df;
      position: fixed;
      z-index: 20;
    }

    .message {
      display: none;
      margin-top: 24px;
      font-size: 24px;
      color: #ff4f9a;
      animation: pop 0.6s ease;
    }

    .flower {
      position: absolute;
      font-size: 28px;
      opacity: 0.8;
      animation: float 5s infinite ease-in-out;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(12deg); }
    }

    .petal {
      position: absolute;
      top: -30px;
      font-size: 22px;
      animation: fall linear infinite;
      pointer-events: none;
      opacity: 0.8;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    .heart {
      position: fixed;
      font-size: 24px;
      animation: heartUp 1.4s ease forwards;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes heartUp {
      from {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      to {
        transform: translateY(-120px) scale(1.8);
        opacity: 0;
      }
    }

    .date-box {
      display: none;
      margin-top: 18px;
      padding: 16px;
      border-radius: 22px;
      background: #fff3fa;
      color: #8b5e6b;
      font-size: 16px;
    }

    .date-box input {
      margin-top: 8px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #ffc1df;
      width: 100%;
      font-size: 15px;
    }

    .final-text {
      margin-top: 12px;
      font-weight: bold;
      color: #ff4f9a;
    }

    @media (max-width: 480px) {
      h1 { font-size: 28px; }
      p { font-size: 17px; }
      button { font-size: 16px; padding: 12px 22px; }
    }
  </style>
</head>

<body>
  <div class="flower" style="top: 8%; left: 12%;">🌸</div>
  <div class="flower" style="top: 18%; right: 10%;">🌷</div>
  <div class="flower" style="bottom: 14%; left: 16%;">🌼</div>
  <div class="flower" style="bottom: 20%; right: 14%;">💐</div>

  <div class="card">
    <h1>Plan Your Date 💐</h1>
    <p id="question">Пойдёшь со мной на свидание?</p>

    <div class="buttons">
      <button id="yesBtn">Да 💖</button>
      <button id="noBtn">Нет 😅</button>
    </div>

    <div class="message" id="message">
      Урааа! Я знал 💘
    </div>

    <div class="date-box" id="dateBox">
      Теперь выбери день нашего свидания 🌙
      <input type="date" id="dateInput" />
      <input type="time" id="timeInput" />
      <div class="final-text" id="finalText"></div>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");
    const dateBox = document.getElementById("dateBox");
    const dateInput = document.getElementById("dateInput");
    const timeInput = document.getElementById("timeInput");
    const finalText = document.getElementById("finalText");

    let yesScale = 1;
    let noScale = 1;
    let noClicks = 0;

    function setNoStartPosition() {
      const rect = yesBtn.getBoundingClientRect();
      noBtn.style.left = rect.right + 18 + "px";
      noBtn.style.top = rect.top + "px";
    }

    window.addEventListener("load", setNoStartPosition);
    window.addEventListener("resize", setNoStartPosition);

    function moveNoButton() {
      noClicks++;

      const maxX = window.innerWidth - noBtn.offsetWidth - 20;
      const maxY = window.innerHeight - noBtn.offsetHeight - 20;

      const randomX = Math.max(10, Math.random() * maxX);
      const randomY = Math.max(10, Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";

      yesScale += 0.18;
      noScale -= 0.08;

      yesBtn.style.transform = `scale(${yesScale})`;
      noBtn.style.transform = `scale(${Math.max(noScale, 0.35)})`;

      if (noClicks === 1) noBtn.innerText = "Точно? 🥺";
      if (noClicks === 2) noBtn.innerText = "Подумай ещё 😭";
      if (noClicks === 3) noBtn.innerText = "Не нажимай 😅";
      if (noClicks >= 4) noBtn.innerText = "нет";

      createHeart(randomX, randomY);
    }

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("click", moveNoButton);
    noBtn.addEventListener("touchstart", moveNoButton);

    yesBtn.addEventListener("click", () => {
      message.style.display = "block";
      dateBox.style.display = "block";
      noBtn.style.display = "none";
      yesBtn.innerText = "Свидание принято 💞";
      startConfetti();
    });

    function updateFinalText() {
      if (dateInput.value && timeInput.value) {
        finalText.innerHTML = `Готово! Наше свидание: ${dateInput.value} в ${timeInput.value} ❤️`;
      }
    }

    dateInput.addEventListener("change", updateFinalText);
    timeInput.addEventListener("change", updateFinalText);

    function createHeart(x, y) {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "💗";
      heart.style.left = x + "px";
      heart.style.top = y + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 1400);
    }

    function createPetals() {
      const petals = ["🌸", "🌷", "🌼", "💮"];
      for (let i = 0; i < 25; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        petal.innerText = petals[Math.floor(Math.random() * petals.length)];
        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = 5 + Math.random() * 5 + "s";
        petal.style.animationDelay = Math.random() * 5 + "s";
        document.body.appendChild(petal);
      }
    }

    function startConfetti() {
      for (let i = 0; i < 45; i++) {
        setTimeout(() => {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.innerText = ["💖", "💘", "🌸", "✨", "💕"][Math.floor(Math.random() * 5)];
          heart.style.left = Math.random() * window.innerWidth + "px";
          heart.style.top = window.innerHeight - 80 + "px";
          document.body.appendChild(heart);

          setTimeout(() => heart.remove(), 1400);
        }, i * 45);
      }
    }

    createPetals();
  </script>
</body>
</html>
